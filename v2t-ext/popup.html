<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      /* ── Astryx 스타일 토큰 (neutral theme 계열) ── */
      :root {
        --color-text-primary: #18181b;
        --color-text-secondary: #71717a;
        --color-background-surface: #ffffff;
        --color-background-page: #fafafa;
        --color-background-muted: #f4f4f5;
        --color-border: #e4e4e7;
        --color-primary: #18181b;
        --color-on-primary: #ffffff;
        --color-danger: #dc2626;
        --color-danger-bg: #fef2f2;

        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;

        --font-family-base:
          Inter, -apple-system, "Segoe UI", Roboto, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        background: var(--color-background-page);
        color: var(--color-text-primary);
        font-family: var(--font-family-base);
      }

      h1 {
        font-size: 15px;
        line-height: 20px;
        font-weight: 600;
        margin: 0 0 2px;
        letter-spacing: -0.1px;
      }
      .subtitle {
        font-size: 12px;
        line-height: 16px;
        color: var(--color-text-secondary);
        margin: 0 0 16px;
      }

      .eyebrow {
        font-size: 11px;
        line-height: 16px;
        font-weight: 600;
        letter-spacing: 0.4px;
        color: var(--color-text-secondary);
        text-transform: uppercase;
        margin: 16px 0 8px;
      }

      /* ── Field ── */
      .field {
        margin: 6px 0;
      }
      .field label {
        display: block;
        margin-bottom: 4px;
        font-size: 12px;
        line-height: 16px;
        color: var(--color-text-secondary);
      }
      .field input {
        width: 100%;
        padding: 8px 10px;
        font-size: 13px;
        line-height: 18px;
        font-family: inherit;
        color: var(--color-text-primary);
        background: var(--color-background-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        outline: none;
        transition:
          border-color 0.12s ease,
          box-shadow 0.12s ease;
      }
      .field input::placeholder {
        color: #a1a1aa;
      }
      .field input:focus {
        border-color: var(--color-primary);
        box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.08);
      }

      /* ── Button ── */
      .btn {
        width: 100%;
        border-radius: var(--radius-md);
        padding: 9px 14px;
        font-size: 13px;
        line-height: 18px;
        font-weight: 500;
        font-family: inherit;
        cursor: pointer;
        margin-top: 8px;
        border: 1px solid transparent;
        transition:
          background 0.12s ease,
          border-color 0.12s ease,
          opacity 0.12s ease;
      }
      .btn-primary {
        background: var(--color-primary);
        color: var(--color-on-primary);
      }
      .btn-primary:hover {
        opacity: 0.88;
      }
      .btn-primary:active {
        opacity: 0.78;
      }

      .btn-secondary {
        background: var(--color-background-surface);
        color: var(--color-text-primary);
        border-color: var(--color-border);
      }
      .btn-secondary:hover {
        background: var(--color-background-muted);
      }

      .btn-danger {
        background: var(--color-background-surface);
        color: var(--color-danger);
        border-color: var(--color-border);
      }
      .btn-danger:hover {
        background: var(--color-danger-bg);
        border-color: #fca5a5;
      }

      .row {
        display: flex;
        gap: 8px;
      }
      .row .btn {
        margin-top: 8px;
      }

      /* ── Checkbox ── */
      .checkbox-row {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        margin: 14px 0 4px;
      }
      .checkbox-row input[type="checkbox"] {
        appearance: none;
        width: 16px;
        height: 16px;
        margin: 1px 0 0;
        border: 1px solid var(--color-border);
        border-radius: 4px;
        background: var(--color-background-surface);
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
      }
      .checkbox-row input[type="checkbox"]:checked {
        background: var(--color-primary);
        border-color: var(--color-primary);
      }
      .checkbox-row input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        left: 4px;
        top: 1px;
        width: 4px;
        height: 8px;
        border: solid var(--color-on-primary);
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
      }
      .checkbox-row label {
        font-size: 12px;
        line-height: 16px;
        color: var(--color-text-secondary);
      }

      /* ── Divider ── */
      .divider {
        border: none;
        border-top: 1px solid var(--color-border);
        margin: 16px 0;
      }

      /* ── Status card ── */
      #msg {
        margin-top: 14px;
        padding: 10px 12px;
        background: var(--color-background-surface);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-lg);
        font-size: 12px;
        line-height: 17px;
        color: var(--color-text-secondary);
        white-space: pre-line;
        min-height: 15px;
      }
      #msg:empty {
        display: none;
      }
    </style>
  </head>
  <body>
    <h1>velog2tistory</h1>
    <p class="subtitle">티스토리 글쓰기 페이지(새 글)에서 실행해주세요</p>

    <div class="eyebrow">Single post</div>
    <div class="field">
      <label for="url">Velog post URL</label>
      <input
        id="url"
        type="text"
        placeholder="https://velog.io/@아이디/글-슬러그"
      />
    </div>
    <button id="goOne" class="btn btn-primary">위 1개의 게시물 옮기기</button>

    <hr class="divider" />

    <div class="eyebrow">Batch migration</div>
    <div class="field">
      <label for="username">Velog ID</label>
      <input id="username" type="text" placeholder="e.g. yourid" />
    </div>
    <button id="fetchAll" class="btn btn-secondary">
      모든 게시물 목록 가져오기
    </button>

    <div class="checkbox-row">
      <input type="checkbox" id="autoConfirm" />
      <label for="autoConfirm">확인 없이 모든 게시물 자동 이전</label>
    </div>

    <!-- 2번 조건: 이미 발행한 글 건너뛰기 옵션 추가 -->
    <div class="checkbox-row">
      <input type="checkbox" id="skipPublished" checked />
      <label for="skipPublished">이미 발행한 글 건너뛰기</label>
    </div>

    <div class="row">
      <button id="start" class="btn btn-primary">이전 시작</button>
      <button id="stop" class="btn btn-danger">중단</button>
    </div>

    <!-- 3번 조건: 발행 이력 초기화 버튼 추가 -->
    <button id="resetHistory" class="btn btn-secondary">
      발행 이력 초기화
    </button>

    <div id="msg"></div>

    <script src="popup.js"></script>
  </body>
</html>
